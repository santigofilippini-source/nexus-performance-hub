<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Qoore</title>
<link rel="icon" type="image/png" href="public/brand/logo-chrome.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#FF6A1A">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
<!-- Open Graph -->
<meta property="og:title" content="Qoore">
<meta property="og:description" content="Gestión de rendimiento deportivo para equipos y atletas.">
<meta property="og:image" content="https://qoore.app/public/brand/logo-horizontal.png">
<meta property="og:url" content="https://qoore.app">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://qoore.app/public/brand/logo-horizontal.png">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" integrity="sha384-sEVIly94UBRLKWdkYoPpSG7GD/e79YHMrxVyZaOk712Ga7+EAw6w1EFi+xBzBdd+" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" integrity="sha384-EkqK+ezBWJuvO3hfrSx2iVqr3YQbhmnzn8kPhOpBZ+0GMVU5oGSgptwIu8D84HjE" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js" integrity="sha384-1/m+A1jVWbD3yiK3/vtFvm1+LjK1WLpSoDY+Kaxppwn/yP9BVSgdHTNQVOjrzUO5" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" integrity="sha384-bs/nf9FbdNouRbMiFcrcZfLXYPKiPaGVGplVbv7dLGECccEXDW+S3zjqSKR5ZEaD" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">
<script src="tiers.js"></script>
</head>
<body>
<div id="loading-screen"><div class="spinner"></div></div>

<div id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo" style="background:transparent;padding:0;box-shadow:none;"><img src="public/brand/logo.png" style="width:160px;height:auto;object-fit:contain;"></div>
    <div class="login-sub">Gestión deportiva profesional</div>
    <!-- Invite banner (shown when URL has ?invite=TOKEN) -->
    <div id="login-invite-banner" class="invite-banner" style="display:none;">
      <div class="invite-banner-title">🎉 Tenés una invitación pendiente</div>
      <div class="invite-banner-sub">Iniciá sesión o registrate para aceptarla.</div>
    </div>
    <!-- Tabs -->
    <div class="login-tabs">
      <button class="login-tab-btn active" id="tab-login-btn" onclick="switchLoginTab('login')">Iniciar sesión</button>
      <button class="login-tab-btn" id="tab-reg-btn" onclick="switchLoginTab('register')">Registrarse</button>
    </div>
    <!-- Login form -->
    <div id="login-form-section">
      <label class="form-label">Correo electrónico</label>
      <input class="form-input" type="email" id="email-input" placeholder="entrenador@club.com" autocomplete="email">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" id="pass-input" placeholder="••••••••" autocomplete="current-password">
      <div style="text-align:right;margin:-6px 0 6px;">
        <button type="button" onclick="doForgotPassword()" style="background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0;opacity:.85;">¿Olvidaste tu contraseña?</button>
      </div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">Iniciar sesión</button>
    </div>
    <!-- Register form -->
    <div id="register-form-section" style="display:none;">
      <label class="form-label">Nombre completo</label>
      <input class="form-input" type="text" id="reg-name" placeholder="Juan García" autocomplete="name">
      <label class="form-label">Correo electrónico</label>
      <input class="form-input" type="email" id="reg-email" placeholder="entrenador@club.com" autocomplete="email">
      <label class="form-label">Contraseña (mín. 6 caracteres)</label>
      <input class="form-input" type="password" id="reg-pass" placeholder="••••••••" autocomplete="new-password">
      <button class="login-btn" id="reg-btn" onclick="doRegister()">Crear cuenta</button>
    </div>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<aside id="nx-sidebar">
  <div class="q-sidebar__brand">
    <img src="public/brand/logo-horizontal.png" style="height:54px;width:auto;">
    <span id="sidebar-tier-badge" class="q-tier-badge" onclick="openSubscriptionModal()"></span>
  </div>
  <div class="q-sidebar__search">
    <div class="q-input-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm10 2-4.3-4.3"/></svg>
      <input class="q-input" placeholder="Buscar equipos, atletas…" id="sidebar-search-input" oninput="handleSidebarSearch(this.value)">
    </div>
  </div>
  <div class="q-sidebar__section"><span>Mis equipos</span><button onclick="S.view='home';S.teamFormMode='new';S.editingTeamId=null;render()" title="Nuevo equipo"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button></div>
  <div class="q-tree" id="nx-sidebar-nav"></div>
  <div id="sync-bar" class="q-sidebar__sync"><span class="dot-green"></span> Conectado</div>
  <div class="q-sidebar__foot">
    <div class="avatar" id="nx-sidebar-avatar">—</div>
    <div class="who"><div class="n" id="nx-sidebar-user">—</div><div class="r" id="nx-sidebar-role">Cargando…</div></div>
    <button class="q-foot-btn" onclick="openProfile()" title="Ajustes"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
    <button class="q-foot-btn" onclick="doLogout()" title="Cerrar sesión"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></button>
  </div>
</aside>
<div id="nx-stats-bar">
  <div class="q-stat"><div class="q-stat__row"><span class="q-stat__label">Equipos activos</span></div><div class="q-stat__val mono" id="nxs-teams">—</div></div>
  <div class="q-stat q-stat--link" onclick="openSearch()" title="Buscar atleta"><div class="q-stat__row"><span class="q-stat__label">Jugadores</span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm10 2-4.3-4.3"/></svg></div><div class="q-stat__val mono" id="nxs-players">—</div></div>
  <div class="q-stat"><div class="q-stat__row"><span class="q-stat__label">Asistencia</span><div style="display:flex;gap:3px;"><button class="nxs-pd active" data-days="7" onclick="S.statsPeriod=7;updateStatsBar()">7d</button><button class="nxs-pd" data-days="30" onclick="S.statsPeriod=30;updateStatsBar()">30d</button></div></div><div class="q-stat__val mono" id="nxs-att">—</div></div>
  <div class="q-stat q-stat--link" onclick="goToTodaySessions()" title="Ver sesiones de hoy"><div class="q-stat__row"><span class="q-stat__label">Sesiones hoy</span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div><div class="q-stat__val mono" id="nxs-sessions">—</div></div>
</div>

<div id="app-screen">
  <div class="header">
    <div class="logo-badge" id="header-logo" style="cursor:pointer;background:transparent;padding:2px;" onclick="handleHeaderLogoClick()"><img src="public/brand/logo-icon.png" style="width:30px;height:30px;object-fit:contain;"></div>
    <div class="header-info">
      <div class="header-club" id="header-club">Qoore</div>
      <div class="header-user" id="user-name">Cargando...</div>
    </div>
    <button class="icon-btn" onclick="openSearch()" title="Buscar jugador">🔍</button>
    <button class="icon-btn" onclick="openProfile()" title="Mi perfil" id="profile-btn">👤</button>
    <button class="logout-btn" onclick="doLogout()">Salir</button>
  </div>
  <div id="app-body"></div>
  <nav id="mob-tabbar">
    <button class="mob-tab" id="mobt-home" onclick="handleMobTab('home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Equipos</span></button>
    <button class="mob-tab" id="mobt-bib" onclick="handleMobTab('bib')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Biblioteca</span></button>
    <button class="mob-tab" id="mobt-ses" onclick="handleMobTab('ses')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden><path d="M6.5 6.5 17.5 17.5M6.5 17.5 17.5 6.5M3 12h2m14 0h2M7 8v8m10-8v8"/></svg><span>Sesión</span></button>
    <button class="mob-tab" id="mobt-cta" onclick="handleMobTab('cta')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/></svg><span>Cuenta</span></button>
  </nav>
</div>

<script src="exercises.js"></script>
<script src="render-programs.js"></script>
<script src="render-athlete.js"></script>
<script src="render-medical.js"></script>
<script src="app.js"></script>
</body>
</html>
