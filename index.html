<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Nexus Performance Hub</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:#334155;--accent:#2563eb;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{font-family:var(--font);background:#0a0f1e;color:var(--text);min-height:100vh}
/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 30% 20%,#1e3a5f44 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,#7c2d1244 0%,transparent 60%),#0a0f1e}
.login-card{width:100%;max-width:380px;background:#111827;border:1px solid #1e293b;border-radius:20px;padding:36px 32px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.login-logo{width:52px;height:52px;background:#e74c3c;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin:0 auto 20px;box-shadow:0 8px 24px #e74c3c44}
.login-title{text-align:center;font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--text2);margin-bottom:32px}
.form-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:6px;display:block;letter-spacing:.04em}
.form-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:15px;font-family:var(--font);outline:none;margin-bottom:16px;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:4px}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{font-size:13px;color:#f87171;text-align:center;margin-top:12px;min-height:18px}
.login-footer{text-align:center;font-size:12px;color:var(--text3);margin-top:28px}
/* APP */
#app-screen{display:none;max-width:480px;margin:0 auto}
.header{background:#0f172a;padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo-badge{width:34px;height:34px;border-radius:9px;background:#e74c3c;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.header-info{flex:1;min-width:0}
.header-club{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.header-user{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.logout-btn,.back-btn{padding:5px 11px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font);flex-shrink:0}
.sync-bar{background:#0f172a;color:var(--text3);font-size:11px;padding:5px 14px;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;border-bottom:1px solid var(--border)}
.dot-green{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;flex-shrink:0}
.dot-yellow{width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;flex-shrink:0}
/* CARDS */
.wrap{padding:14px}
.team-card{border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;border:1px solid var(--border);background:#111827;text-align:left;width:100%;position:relative;overflow:hidden}
.team-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.cat-card{border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);background:#111827;text-align:left;width:100%;position:relative;overflow:hidden}
.cat-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-ok{background:#dcfce7;color:#166534}
.badge-mid{background:#fef9c3;color:#854d0e}
.badge-bad{background:#fee2e2;color:#991b1b}
.badge-today{background:#dcfce7;color:#166534}
.badge-nottoday{background:var(--bg2);color:var(--text3)}
/* SECTION HEADER */
.sec-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:#0f172a;flex-wrap:wrap;position:sticky;top:57px;z-index:90}
.sec-title{font-size:15px;font-weight:500;color:var(--text);flex:1;min-width:0}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:101px;z-index:89}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:55px;padding:9px 4px;border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--text2);font-family:var(--font);border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn.active{color:var(--text);font-weight:600;border-bottom-color:var(--accent)}
/* INPUTS */
.date-row{display:flex;align-items:center;gap:6px;background:var(--bg2);border-radius:10px;padding:6px 8px;margin-bottom:12px;border:1px solid var(--border)}
.arrow-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:#111827;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
input[type=date]{font-size:13px;border:none;background:transparent;color:var(--text);font-family:var(--font);text-align:center;width:100%;cursor:pointer}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.5)}
input[type=number]{font-size:15px;border:1px solid var(--border);background:#111827;color:var(--text);font-family:var(--font);border-radius:8px;padding:7px 10px;text-align:center;width:80px}
/* BUTTONS */
.quick-row{display:flex;gap:8px;margin-bottom:12px}
.quick-btn{flex:1;padding:8px 0;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);border:1px solid}
.quick-p{background:#052e16;color:#86efac;border-color:#166534}
.quick-a{background:#2d0a0a;color:#fca5a5;border-color:#991b1b}
.save-btn{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font)}
.add-btn{padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font);white-space:nowrap}
.sm-btn{padding:3px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font);border:1px solid var(--border);background:transparent;color:var(--text2)}
.del-confirm-btn{padding:3px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font);background:#2d0a0a;color:#fca5a5;border:1px solid #991b1b}
.sub-tab{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:var(--font);font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text2)}
.sub-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.icon-btn{width:34px;height:34px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
/* PLAYER ROWS */
.player-row{display:flex;align-items:center;gap:8px;background:#111827;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.player-name{flex:1;font-size:14px;color:var(--text)}
.status-group{display:flex;gap:3px}
.status-btn{width:36px;height:36px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);border:1px solid var(--border);background:transparent;color:var(--text3)}
.status-btn.active-p{background:#052e16;color:#86efac;border-color:#166534}
.status-btn.active-a{background:#2d0a0a;color:#fca5a5;border-color:#991b1b}
.status-btn.active-j{background:#1c1400;color:#fcd34d;border-color:#92400e}
.save-row{margin-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.save-counts{flex:1;display:flex;gap:5px;flex-wrap:wrap}
.count-chip{font-size:12px;padding:3px 9px;border-radius:20px}
.chip-p{background:#052e16;color:#86efac}
.chip-a{background:#2d0a0a;color:#fca5a5}
.chip-j{background:#1c1400;color:#fcd34d}
/* RPE */
.sub-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.dur-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.rpe-section{margin-bottom:16px}
.rpe-title{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.rpe-picker{display:flex;gap:3px}
.rpe-btn{flex:1;min-width:0;height:42px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);background:var(--bg2);color:var(--text3);transition:transform .1s}
.rpe-btn.sel{transform:scale(1.1);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.rpe-label-box{text-align:center;font-size:12px;font-weight:600;margin-top:6px;min-height:18px;padding:4px 12px;border-radius:8px}
.rpe-mode-row{display:flex;gap:6px;margin-bottom:12px}
.rpe-mode-btn{flex:1;padding:7px 0;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);border:1px solid var(--border);background:transparent;color:var(--text2)}
.rpe-mode-btn.active{background:#0f172a;color:var(--text);border-color:var(--text3)}
.load-est{font-size:12px;color:var(--text2);text-align:center;margin-top:6px;padding:6px;background:var(--bg2);border-radius:8px}
.p-rpe-row{background:#111827;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.p-rpe-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.p-rpe-name{font-size:14px;color:var(--text);font-weight:500}
/* WELLNESS */
.well-player-row{background:#111827;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.well-player-top{display:flex;align-items:center;gap:8px}
.well-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.well-expand{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;cursor:default}
.well-item{margin-bottom:10px}
.well-key{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px}
.well-opts{display:flex;gap:4px}
.well-btn{width:36px;height:34px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;font-family:var(--font);background:transparent;border:1px solid}
.well-btn.w-sel{color:#fff!important}
.well-tip{font-size:11px;color:var(--text3);margin-top:3px;display:block}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
/* METRICS */
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.metric{background:var(--bg2);border-radius:10px;padding:12px;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.metric-val{font-size:22px;font-weight:500;color:var(--text)}
.alert-banner{background:#2d0a0a;border:1px solid #991b1b;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#fca5a5;display:flex;gap:6px;flex-direction:column}
.alert-banner-title{display:flex;align-items:center;gap:6px;font-weight:500}
.metrics-card{background:#111827;border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.metrics-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.metrics-name{font-size:14px;font-weight:500;color:var(--text)}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px}
.m-cell{background:var(--bg2);border-radius:7px;padding:5px 6px;text-align:center}
.m-cell-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.m-cell-val{font-size:13px;font-weight:600;color:var(--text)}
.zone-legend{display:flex;flex-wrap:wrap;gap:5px}
.zone-chip{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.empty-state{text-align:center;padding:40px 20px;font-size:14px;color:var(--text2);line-height:1.7}
/* REPORTS */
.report-row{background:#111827;border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:6px}
.rep-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rep-name{font-size:14px;font-weight:500;color:var(--text)}
.rep-detail{display:flex;gap:8px;font-size:12px;color:var(--text2);margin-top:3px;flex-wrap:wrap}
.pbar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:2px}
/* ROSTER */
.roster-add{display:flex;gap:8px;margin-bottom:12px}
.roster-input{flex:1;font-size:14px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:#111827;color:var(--text);font-family:var(--font)}
.roster-row{background:#111827;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.roster-num{font-size:12px;color:var(--text3);min-width:20px}
.roster-name{flex:1;font-size:14px;color:var(--text)}
/* LOADING */
#loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* CHARTS */
.chart-card{background:#111827;border:1px solid var(--border);border-radius:12px;padding:14px 12px 10px;margin-bottom:12px}
.chart-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px}
.chart-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.chart-legend-dot{width:10px;height:3px;border-radius:2px;flex-shrink:0}
/* SEARCH */
.search-header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);background:#0f172a}
.search-input-main{flex:1;font-size:15px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--font);outline:none}
.search-input-main:focus{border-color:var(--accent)}
.search-cancel{padding:8px 12px;border:none;background:transparent;color:var(--accent);font-size:14px;cursor:pointer;font-family:var(--font);white-space:nowrap}
.search-result{display:flex;align-items:center;gap:10px;background:#111827;border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;width:100%;text-align:left}
.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.s-name{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.s-cat{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
/* ATHLETE */
.ath-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:#0f172a}
.ath-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.ath-name-block{flex:1;min-width:0}
.ath-fullname{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ath-sub{font-size:11px;color:var(--text2);margin-top:1px}
.eval-card{background:#111827;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.eval-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.eval-date{font-size:12px;color:var(--text2);font-weight:500}
.eval-del{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font)}
.eval-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.eval-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.eval-cell{background:var(--bg2);border-radius:7px;padding:6px 7px;text-align:center}
.eval-cell-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.eval-cell-val{font-size:13px;font-weight:600;color:var(--text)}
.eval-delta{font-size:10px;margin-top:1px}
.delta-up{color:#22c55e}
.delta-dn{color:#ef4444}
.form-card{background:var(--bg2);border:1px solid var(--accent);border-radius:12px;padding:14px;margin-bottom:12px}
.form-card-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.form-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.form-field{display:flex;flex-direction:column;gap:3px}
.form-field label{font-size:11px;color:var(--text2)}
.form-field input,.form-field select,.form-field textarea{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:#111827;color:var(--text);font-size:13px;font-family:var(--font);outline:none;width:100%}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.form-field select option{background:#1e293b}
.form-row{display:flex;gap:8px;align-items:flex-end;margin-top:10px}
.jump-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.jump-cell{background:var(--bg2);border-radius:8px;padding:8px 5px;text-align:center}
.jump-lbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.jump-val{font-size:18px;font-weight:700;color:var(--text)}
.jump-unit{font-size:10px;color:var(--text3)}
.fold-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px}
.fold-row:last-child{border-bottom:none}
.fold-name{color:var(--text2)}
.fold-val{color:var(--text);font-weight:500}
/* TEAM MANAGEMENT */
.team-manage-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);border:1px solid;white-space:nowrap}
.sport-badge{font-size:10px;padding:2px 7px;border-radius:12px;font-weight:600;background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.team-logo{width:48px;height:48px;border-radius:12px;object-fit:cover;flex-shrink:0}
.logo-upload-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font)}
.logo-preview{width:64px;height:64px;border-radius:12px;object-fit:cover;border:2px solid var(--accent)}
/* ── PERMISOS & INVITACIONES ─────────────────────────────── */
.role-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0;}
.role-owner{background:#1e3a5f;color:#60a5fa;border:1px solid #1e40af;}
.role-editor{background:#052e16;color:#86efac;border:1px solid #166534;}
.role-viewer{background:#1c1400;color:#fcd34d;border:1px solid #92400e;}
.access-panel{background:#111827;border:1px solid var(--accent);border-radius:12px;padding:14px;margin-bottom:14px;}
.access-panel-title{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.member-row{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--bg2);border-radius:8px;margin-bottom:6px;border:1px solid var(--border);}
.member-email{flex:1;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.invite-link-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:11px;color:var(--text2);word-break:break-all;margin:8px 0;line-height:1.5;}
.cat-perm-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.cat-perm-row:last-child{border-bottom:none;}
.perm-btn{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);border:1px solid var(--border);background:transparent;color:var(--text3);}
.perm-btn.sel-edit{background:#052e16;color:#86efac;border-color:#166534;}
.perm-btn.sel-view{background:#1c1400;color:#fcd34d;border-color:#92400e;}
.perm-btn.sel-none{background:#2d0a0a;color:#fca5a5;border-color:#991b1b;}
.invite-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
.invite-modal-card{background:#111827;border:1px solid var(--accent);border-radius:16px;padding:24px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;}
.readonly-overlay{pointer-events:none;opacity:.45;}
.readonly-banner{background:#1c1400;border:1px solid #92400e;border-radius:8px;padding:8px 12px;font-size:12px;color:#fcd34d;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
/* LOGIN TABS */
.login-tabs{display:flex;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:20px;gap:2px;}
.login-tab-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;font-family:var(--font);transition:background .15s;}
.login-tab-btn.active{background:#0f172a;color:var(--text);}
.invite-banner{background:#052e16;border:1px solid #166534;border-radius:10px;padding:10px 12px;margin-bottom:16px;font-size:13px;color:#86efac;}
.invite-banner-title{font-weight:600;margin-bottom:2px;}
.invite-banner-sub{font-size:11px;color:#4ade80;opacity:.8;}
</style>
</head>

    <div id="login-form-section">

      <input class="form-input" type="email" id="email-input" placeholder="entrenador@club.com" autocomplete="email">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" id="pass-input" placeholder="••••••••" autocomplete="current-password">
      <button class="login-btn" id="login-btn" onclick="doLogin()">Iniciar sesión</button>

    <div id="register-form-section" style="display:none;">

      <input class="form-input" type="email" id="reg-email" placeholder="entrenador@club.com" autocomplete="email">
      <label class="form-label">Contraseña (mín. 6 caracteres)</label>

// ── Accessors ─────────────────────────────────────────────────
function getTeam(tid=S.teamId) { return S.teams[tid] || {name:'',sport:'',categories:{}}; }
function getCats(tid=S.teamId) { return Object.keys(getTeam(tid).categories||{}); }
function getCat(cat=S.cat, tid=S.teamId) {
  const c = getTeam(tid).categories?.[cat];
  if (!c) return {players:[],attendance:{},sessions:{}};
  if (!c.players || typeof c.players !== 'object') c.players=[];
  else if (!Array.isArray(c.players)) c.players=Object.values(c.players);
  if (!c.attendance || typeof c.attendance !== 'object') c.attendance={};
  if (!c.sessions || typeof c.sessions !== 'object') c.sessions={};
  return c;
}
function getCatName(cat=S.cat, tid=S.teamId) { return getTeam(tid).categories?.[cat]?.name || '—'; }
function getCatColor(cat=S.cat, tid=S.teamId) {
  const cats = getCats(tid);
  const idx = cats.indexOf(cat);
  return getTeam(tid).categories?.[cat]?.color || CAT_PALETTE[idx>=0?idx%CAT_PALETTE.length:0];
}
function athleteKey(teamId=S.teamId, catId=S.cat, pid) { return `${teamId}__${catId}__${pid}`; }

// ── Detect invite token from URL ──────────────────────────────
(function(){
  const params=new URLSearchParams(window.location.search);
  const tok=params.get('invite');
  if(tok){
    S.pendingInvite=tok;
    const banner=document.getElementById('login-invite-banner');
    if(banner)banner.style.display='block';
    // Switch to register tab by default for invite flow
    setTimeout(()=>switchLoginTab('register'),0);
  }
})();

// ── Login tab switch ──────────────────────────────────────────
function switchLoginTab(tab){
  document.getElementById('login-form-section').style.display=tab==='login'?'block':'none';
  document.getElementById('register-form-section').style.display=tab==='register'?'block':'none';
  document.getElementById('tab-login-btn').classList.toggle('active',tab==='login');
  document.getElementById('tab-reg-btn').classList.toggle('active',tab==='register');
  document.getElementById('login-err').textContent='';
}

// ── Auth ──────────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  document.getElementById('loading-screen').style.display='none';
  if (user) {
    currentUser=user;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('user-name').textContent=user.displayName||user.email.split('@')[0];
    await loadAll();
    // After loading, check for pending invite
    if(S.pendingInvite){
      await handlePendingInvite(S.pendingInvite);
    }
  } else {
    currentUser=null;
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

async function doLogin() {
  const email=document.getElementById('email-input').value.trim();
  const pass=document.getElementById('pass-input').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-err');
  if(!email||!pass){err.textContent='Ingresá email y contraseña.';return;}
  btn.disabled=true; btn.textContent='Ingresando...'; err.textContent='';
  try { await auth.signInWithEmailAndPassword(email,pass); }
  catch(e) {
    const msgs={'auth/user-not-found':'Usuario no encontrado.','auth/wrong-password':'Contraseña incorrecta.','auth/invalid-credential':'Email o contraseña incorrectos.','auth/too-many-requests':'Demasiados intentos.'};
    err.textContent=msgs[e.code]||'Error: '+e.message;
    btn.disabled=false; btn.textContent='Iniciar sesión';
  }
}
async function doRegister() {
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const btn=document.getElementById('reg-btn');
  const err=document.getElementById('login-err');
  if(!email||!pass){err.textContent='Ingresá email y contraseña.';return;}
  if(pass.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres.';return;}
  btn.disabled=true; btn.textContent='Creando cuenta...'; err.textContent='';
  try {
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    if(name) await cred.user.updateProfile({displayName:name});
  } catch(e) {
    const msgs={'auth/email-already-in-use':'Ya existe una cuenta con ese email.','auth/invalid-email':'Email inválido.','auth/weak-password':'Contraseña muy débil.'};
    err.textContent=msgs[e.code]||'Error: '+e.message;
    btn.disabled=false; btn.textContent='Crear cuenta';
  }
}

// ── Firebase Storage ──────────────────────────────────────────
function setSyncBar(status, msg) {
  const bar=document.getElementById('sync-bar'); if(!bar)return;
  const t=new Date().toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'});
  if(status==='ok')     bar.innerHTML=`<span class="dot-green"></span> Sincronizado · ${t}`;
  if(status==='saving') bar.innerHTML=`<span class="dot-yellow"></span> Guardando...`;
  if(status==='loading')bar.innerHTML=`<span class="dot-yellow"></span> Cargando...`;
  if(status==='error')  bar.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;"></span> ${msg||'Sin conexión — datos locales'}`;
}

async function loadAll() {
  setSyncBar('loading');
  try {
    // 1. Load memberships
    const mSnap = await db.ref(`users/${currentUser.uid}/memberships`).get();
    S.memberships = mSnap.exists() ? (mSnap.val()||{}) : {};

    // 2. If no memberships yet, check for legacy teams to migrate
    if(!Object.keys(S.memberships).length){
      const legacySnap = await db.ref(`users/${currentUser.uid}/teams`).get();
      if(legacySnap.exists()){
        await migrateToSharedSpace(legacySnap.val());
      } else {
        S.teams={};
      }
    } else {
      // 3. Load each team from /teams/{teamId}
      S.teams={};
      const teamIds = Object.keys(S.memberships);
      await Promise.all(teamIds.map(async tid=>{
        try {
          const tSnap = await db.ref(`teams/${tid}`).get();
          if(tSnap.exists() && tSnap.val()?.name){
            S.teams[tid]=tSnap.val()||{};
            normalizeTeam(tid);
          } else {
            // Team data missing from shared space (owner on legacy path)
            S.teams[tid]={ name:'Equipo pendiente de migración', sport:'', categories:{}, _legacyPending:true };
          }
        } catch(e) { console.warn('Could not load team',tid,e); }
      }));
    }

    // FALLBACK: if still no teams, try loading directly from legacy path
    // (happens when Firebase rules block /teams/ writes during migration)
    if(!Object.keys(S.teams).length){
      const legacySnap = await db.ref(`users/${currentUser.uid}/teams`).get();
      if(legacySnap.exists()){
        console.warn('Using legacy path fallback — update Firebase rules to enable migration');
        S.teams = legacySnap.val()||{};
        Object.keys(S.teams).forEach(tid=>{
          normalizeTeam(tid);
          S.memberships[tid]={role:'owner',permissions:{},joinedAt:TODAY};
        });
      }
    }

    // For non-owner memberships: fetch authoritative permissions from teams/{tid}/memberPermissions/
    // (owner can update these without needing write access to other users' paths)
    await Promise.all(Object.entries(S.memberships).map(async ([tid, mem])=>{
      if(mem.role==='owner') return;
      try {
        const pSnap = await db.ref(`teams/${tid}/memberPermissions/${currentUser.uid}`).get();
        if(pSnap.exists()){
          const fresh = pSnap.val()||{};
          S.memberships[tid] = {...mem, role: fresh.role||mem.role, permissions: fresh.permissions||mem.permissions||{}};
        }
      } catch(e){ /* use cached membership */ }
    }));

    // 4. Load athletes — try new path first, fallback to legacy
    S.athletes={};
    const teamIds = Object.keys(S.teams);
    await Promise.all(teamIds.map(async tid=>{
      // Try new shared path
      try {
        const aSnap = await db.ref(`teams/${tid}/athletes`).get();
        if(aSnap.exists()){ Object.assign(S.athletes, aSnap.val()||{}); return; }
      } catch(e) { /* fallthrough */ }
      // Fallback: legacy athletes path
      try {
        const aSnap2 = await db.ref(`users/${currentUser.uid}/athletes`).get();
        if(aSnap2.exists()) Object.assign(S.athletes, aSnap2.val()||{});
      } catch(e) { /* ignore */ }
    }));

    // 5. Load user profile
    const pSnap = await db.ref(`users/${currentUser.uid}/profile`).get();
    S.userProfile = pSnap.exists() ? (pSnap.val()||{}) : {};

    setSyncBar('ok');
  } catch(e) {
    console.error(e); setSyncBar('error');
  }
  updateHeader();
  render();
}

    if (S.prevCat) { S.view='cat'; S.teamId=S.prevTeamId||S.teamId; S.cat=S.prevCat; }

    else { S.view='home'; }
    S.athleteForm=null; render();

}

      <button class="sm-btn" style="color:#fca5a5;border-color:#991b1b;" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>`;
}

function normalizeTeam(tid) {
  const team = S.teams[tid];
  if (!team) return;
  if (!team.categories || typeof team.categories !== 'object') team.categories={};
  Object.keys(team.categories).forEach(cid => {
    const c = team.categories[cid];
    if (!c.players) c.players=[];
    else if (!Array.isArray(c.players)) c.players=Object.values(c.players);
    if (!c.attendance || typeof c.attendance !== 'object') c.attendance={};
    if (!c.sessions || typeof c.sessions !== 'object') c.sessions={};
    // Normalize sessions
    Object.values(c.sessions).forEach(sess=>{
      if(!sess.playerRPE||typeof sess.playerRPE!=='object') sess.playerRPE={};
      if(!sess.wellness||typeof sess.wellness!=='object') sess.wellness={};
    });
  });
}

// ── Migration: legacy users/{uid}/teams/ → /teams/{teamId} ───
async function migrateToSharedSpace(legacyTeams) {
  // Step 1: always build in-memory state from legacy data first
  // so the app works even if Firebase write fails
  S.teams={};
  S.memberships={};
  const writes={};
  for(const [tid, team] of Object.entries(legacyTeams)){
    const teamData={...team, ownerId:currentUser.uid};
    writes[`teams/${tid}`]=teamData;
    writes[`users/${currentUser.uid}/memberships/${tid}`]={role:'owner',permissions:{},joinedAt:TODAY};
    S.teams[tid]=teamData;
    S.memberships[tid]={role:'owner',permissions:{},joinedAt:TODAY};
    normalizeTeam(tid);
  }
  // Migrate athletes from users/{uid}/athletes/ → teams/{tid}/athletes/
  try {
    const aSnap = await db.ref(`users/${currentUser.uid}/athletes`).get();
    if(aSnap.exists()){
      const oldAths = aSnap.val()||{};
      Object.entries(oldAths).forEach(([key,val])=>{
        const parts=key.split('__'); const tid=parts[0];
        if(S.teams[tid]) writes[`teams/${tid}/athletes/${key}`]=val;
      });
    }
  } catch(e) { console.warn('Could not read legacy athletes'); }

  // Step 2: try to write to new shared structure
  // If this fails (e.g. rules), the app still works via the legacy fallback in loadAll
  try {
    await db.ref().update(writes);
    // Only remove legacy AFTER confirmed write success
    await db.ref(`users/${currentUser.uid}/teams`).remove();
    console.log('Migration to shared space complete');
  } catch(e) {
    console.warn('Migration write blocked (likely Firebase rules) — app will use legacy path until rules are updated. Error:', e.message);
    // S.teams and S.memberships are already populated above — app continues working
  }
}
// ── Old v1 data migration (keeps backward compat) ─────────────
async function migrateOldData() {
  try {

    if (!dSnap.exists()) { S.teams={}; return; }
    const oldData = dSnap.val();
    const tid = 'team_'+Date.now();
    const colorMap = {U16A:'#2563eb',U18A:'#d97706',U18B:'#059669'};
    const cats={};
    const catIdMap={};
    ['U16A','U18A','U18B'].forEach(c=>{
      if(oldData[c]){
        const cid='cat_'+Date.now()+'_'+c;
        catIdMap[c]=cid;
        cats[cid]={name:c,color:colorMap[c]||'#2563eb',players:Array.isArray(oldData[c].players)?oldData[c].players:Object.values(oldData[c].players||[]),attendance:oldData[c].attendance||{},sessions:oldData[c].sessions||{}};
      }
    });
    const team={name:'Mi equipo',sport:'Básquetbol',createdAt:TODAY,ownerId:currentUser.uid,categories:cats};
    S.teams={[tid]:team};
    S.memberships={[tid]:{role:'owner',permissions:{},joinedAt:TODAY}};
    const writes={};
    writes[`teams/${tid}`]=team;
    writes[`users/${currentUser.uid}/memberships/${tid}`]={role:'owner',permissions:{},joinedAt:TODAY};
    const aSnap=await db.ref(`users/${currentUser.uid}/athletes`).get();
    if(aSnap.exists()){
      const oldAths=aSnap.val();
      Object.entries(oldAths).forEach(([oldKey,athData])=>{

// ── Permission helpers ────────────────────────────────────────
function myRole(tid=S.teamId){ return (S.memberships[tid]||{}).role||null; }
function isOwner(tid=S.teamId){ return myRole(tid)==='owner'; }
function canEdit(tid=S.teamId, cid=S.cat){
  const role=myRole(tid); if(!role) return false;
  if(role==='owner') return true;
  if(role==='editor'){
    const perms=(S.memberships[tid]||{}).permissions||{};
    if(!Object.keys(perms).length) return true; // no restrictions = all cats editable
    const p=perms[cid];
    return !p || p==='edit'; // missing key or explicit 'edit' → can edit
  }
  return false;
}
function canView(tid=S.teamId, cid=S.cat){
  const role=myRole(tid); if(!role) return false;
  if(role==='owner'||role==='editor') return true;
  const perms=(S.memberships[tid]||{}).permissions||{};
  if(!Object.keys(perms).length) return true;
  const p=perms[cid];
  return !p || p==='view'||p==='edit'; // missing = can view
}

// ── Invitation system ─────────────────────────────────────────
function genToken(){ return Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2); }

async function createInvitation(tid, email, role, permissions){
  const token = genToken();
  const now = new Date();
  const exp = new Date(now); exp.setDate(exp.getDate()+7);
  const inv = {
    teamId:tid, teamName:S.teams[tid]?.name||'',
    invitedEmail:email.toLowerCase(), role, permissions,
    createdByUid:currentUser.uid,
    createdAt:now.toISOString(), expiresAt:exp.toISOString(), status:'pending'
  };
  // Write to global invitations (for the token link) AND to team's pendingInvites (for owner panel)
  await db.ref().update({
    [`invitations/${token}`]: inv,
    [`teams/${tid}/pendingInvites/${token}`]: {
      invitedEmail: email.toLowerCase(), role, permissions,
      createdAt: now.toISOString(), expiresAt: exp.toISOString()
    }
  });
  return token;
}

async function handlePendingInvite(token){
  try {
    const snap = await db.ref(`invitations/${token}`).get();
    if(!snap.exists()){ S.pendingInvite=null; return; }
    const inv = snap.val();
    if(inv.status!=='pending'){ alert('Esta invitación ya fue usada.'); S.pendingInvite=null; return; }
    if(new Date()>new Date(inv.expiresAt)){ alert('Esta invitación expiró (7 días).'); S.pendingInvite=null; return; }
    // Hard block: invitation must match the logged-in user's email
    if(inv.invitedEmail && inv.invitedEmail!==currentUser.email?.toLowerCase()){
      alert(`Esta invitación es para ${inv.invitedEmail}.\nEstás logueado como ${currentUser.email}.\n\nPor favor cerrá sesión e ingresá con la cuenta correcta.`);
      S.pendingInvite=null;
      window.history.replaceState({},'',window.location.pathname);
      return;
    }
    S.pendingInviteData={token,...inv};
    S.showInviteModal=true;
    render();
  } catch(e){ console.error('Error loading invite:',e); }
}

async function acceptInvitation(){
  const inv = S.pendingInviteData;
  if(!inv||!currentUser) return;
  const {token, teamId, role, permissions} = inv;
  try {
    // Step 1: write membership first so the teams/ rule passes in step 2
    await db.ref(`users/${currentUser.uid}/memberships/${teamId}`).set({role,permissions,joinedAt:TODAY});
    // Step 2: write to teams/ + mark invite accepted + write notification for owner + remove from pendingInvites
    const notifId = 'notif_'+Date.now();
    await db.ref().update({
      [`invitations/${token}/status`]:'accepted',
      [`invitations/${token}/acceptedByUid`]:currentUser.uid,
      [`teams/${teamId}/memberIndex/${currentUser.uid}`]:{email:currentUser.email,role,displayName:currentUser.displayName||''},
      [`teams/${teamId}/memberPermissions/${currentUser.uid}`]:{role,permissions},
      [`teams/${teamId}/pendingInvites/${token}`]:null, // remove from pending
      [`teams/${teamId}/notifications/${notifId}`]:{
        type:'invite_accepted',
        uid:currentUser.uid,
        email:currentUser.email||'',
        displayName:currentUser.displayName||currentUser.email?.split('@')[0]||'Usuario',
        role,
        timestamp:new Date().toISOString(),
        read:false
      }
    });
    S.memberships[teamId]={role,permissions,joinedAt:TODAY};
    const tSnap = await db.ref(`teams/${teamId}`).get();
    if(tSnap.exists() && tSnap.val()?.name){
      S.teams[teamId]=tSnap.val(); normalizeTeam(teamId);
    } else {
      S.teams[teamId]={ name: inv.teamName||'Equipo compartido', sport:'', categories:{}, _legacyPending:true };
    }
    S.pendingInvite=null; S.pendingInviteData=null; S.showInviteModal=false;
    window.history.replaceState({},'',window.location.pathname);
    render();
    alert(`✓ Te uniste a "${inv.teamName}" como ${role==='editor'?'Editor':'Lector'}.`);
  } catch(e){ console.error('Error accepting invite:',e); alert('Error al aceptar la invitación.'); }
}

async function revokeAccess(tid, memberUid){
  if(!confirm('¿Quitar acceso a este usuario?')) return;
  try {
    await db.ref(`users/${memberUid}/memberships/${tid}`).remove();
    await db.ref(`teams/${tid}/memberIndex/${memberUid}`).remove();
    await db.ref(`teams/${tid}/memberPermissions/${memberUid}`).remove();
    S.editingMember=null;
    await loadTeamMembers(tid);
    render();
  } catch(e){ alert('Error al quitar acceso.'); }
}

async function updateMemberPermissions(tid, memberUid, role, permissions){
  try {
    // Owner writes to teams/ (allowed by rules)
    await db.ref().update({
      [`teams/${tid}/memberIndex/${memberUid}/role`]: role,
      [`teams/${tid}/memberPermissions/${memberUid}`]: {role, permissions}
    });
    // Update local memberIndex display
    await loadTeamMembers(tid);
    S.editingMember=null;
    render();
  } catch(e){ alert('Error al actualizar permisos.'); }
}

async function loadTeamMembers(tid){
  try {
    const [idxSnap, permSnap, notifSnap, invSnap] = await Promise.all([
      db.ref(`teams/${tid}/memberIndex`).get(),
      db.ref(`teams/${tid}/memberPermissions`).get(),
      db.ref(`teams/${tid}/notifications`).get(),
      db.ref(`teams/${tid}/pendingInvites`).get()
    ]);
    const index = idxSnap.exists()  ? idxSnap.val()||{}  : {};
    const perms = permSnap.exists() ? permSnap.val()||{} : {};
    S.teamMembers[tid] = Object.entries(index).map(([uid,v])=>({
      uid, ...v, permissions: perms[uid]?.permissions||{}
    }));
    // Notifications: sort newest first, only unread or last 5
    const notifs = notifSnap.exists() ? Object.entries(notifSnap.val()||{}) : [];
    S.teamNotifs[tid] = notifs
      .map(([id,n])=>({id,...n}))
      .sort((a,b)=>b.timestamp?.localeCompare(a.timestamp||'')||0);
    // Pending invites: include expired ones so owner can see/resend
    const invs = invSnap.exists() ? Object.entries(invSnap.val()||{}) : [];
    S.teamInvites[tid] = invs
      .map(([token,v])=>({token,...v}))
      .sort((a,b)=>b.createdAt?.localeCompare(a.createdAt||'')||0);
  } catch(e){ S.teamMembers[tid]=[]; S.teamNotifs[tid]=[]; S.teamInvites[tid]=[]; }
}

async function revokeInvite(tid, token){
  if(!confirm('¿Revocar esta invitación? El link dejará de funcionar.')) return;
  try {
    await db.ref().update({
      [`invitations/${token}/status`]:'revoked',
      [`teams/${tid}/pendingInvites/${token}`]:null
    });
    S.teamInvites[tid]=(S.teamInvites[tid]||[]).filter(i=>i.token!==token);
    render();
  } catch(e){ alert('Error al revocar.'); }
}

async function markNotifsRead(tid){
  const unread=(S.teamNotifs[tid]||[]).filter(n=>!n.read);
  if(!unread.length) return;
  const updates={};
  unread.forEach(n=>{ updates[`teams/${tid}/notifications/${n.id}/read`]=true; });
  try {
    await db.ref().update(updates);
    (S.teamNotifs[tid]||[]).forEach(n=>{ n.read=true; });
  } catch(e){}
}

  const linkSection = S.inviteLink
    ? '<div style="font-size:12px;color:#86efac;margin-bottom:4px;font-weight:500;">✓ Compartí este link:</div>'

    +'<div class="form-field" style="margin-bottom:8px;"><label>Rol</label>'
    +'<div style="display:flex;gap:6px;margin-top:4px;">'
    +'<button class="perm-btn '+((form.role||'editor')==='editor'?'sel-edit':'')+'" data-action="setinviterole" data-val="editor">Editor</button>'
    +'<button class="perm-btn '+((form.role||'editor')==='viewer'?'sel-view':'')+'" data-action="setinviterole" data-val="viewer">Lector</button>'

    +'</div>';
}

function getAthlete(key) {
  if(!S.athletes[key]) S.athletes[key]={};
  const a=S.athletes[key];
  if(!a.personal) a.personal={};
  if(!a.morphology||typeof a.morphology!=='object') a.morphology={};
  if(!a.anthropometry||typeof a.anthropometry!=='object') a.anthropometry={};
  if(!a.jumpTests||typeof a.jumpTests!=='object') a.jumpTests={};
  if(!a.fmsTests||typeof a.fmsTests!=='object') a.fmsTests={};
  return a;
}

// ── Helpers ───────────────────────────────────────────────────
const fmtDate = d=>{if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;};
function timeSince(date){const s=Math.floor((new Date()-date)/1000);if(s<60)return'Hace un momento';const m=Math.floor(s/60);if(m<60)return`Hace ${m} min`;const h=Math.floor(m/60);if(h<24)return`Hace ${h}h`;const d=Math.floor(h/24);return`Hace ${d} día${d!==1?'s':''}`;};
const fmtMonth= ym=>{const[y,m]=ym.split('-');return`${MES[+m-1]} '${y.slice(2)}`;};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function calcAge(bd){if(!bd)return null;const b=new Date(bd),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return a;}
function wellColor(v){return W_COLORS[v-1]||'#64748b';}
function pctClass(p){return p>=75?'badge-ok':p>=50?'badge-mid':'badge-bad';}
function pctBadge(pct){
  if(pct===null)return`<span style="font-size:14px;color:var(--text3);">—</span>`;
  const bg=pct>=75?'#052e16':pct>=50?'#1c1400':'#2d0a0a';
  const c=pct>=75?'#86efac':pct>=50?'#fcd34d':'#fca5a5';
  return`<span style="font-size:14px;font-weight:500;padding:2px 9px;border-radius:20px;background:${bg};color:${c};">${pct}%</span>`;
}
function acwrZone(v){
  if(v===null)return{bg:'#1e293b33',fg:'#64748b',label:'Sin datos',border:'#1e293b'};
  if(v<0.8)   return{bg:'#1e293b',fg:'#94a3b8',label:'Subcarga',border:'#475569'};
  if(v<=1.3)  return{bg:'#052e16',fg:'#86efac',label:'Óptimo',border:'#166534'};
  if(v<=1.5)  return{bg:'#1c1400',fg:'#fcd34d',label:'Precaución',border:'#92400e'};
  return{bg:'#2d0a0a',fg:'#fca5a5',label:'Riesgo',border:'#991b1b'};
}
function monoZone(v){return!v?{fg:'#64748b'}:v<1.5?{fg:'#86efac'}:v<=2.0?{fg:'#fcd34d'}:{fg:'#fca5a5'};}
function wellZone(v){return v===null?{fg:'#64748b'}:v>=4?{fg:'#86efac'}:v>=3?{fg:'#22c55e'}:v>=2?{fg:'#d97706'}:{fg:'#dc2626'};}
function sparkColor(v,max){if(!v)return'var(--bg2)';const r=max>0?v/max:0;return r<0.4?'#22c55e':r<0.7?'#f59e0b':'#ef4444';}
function sparkColorByType(v,max,type){if(!v)return type==='libre'?'#1e293b':'var(--bg2)';if(type==='partido')return'#6366f1';if(type==='recuperacion')return'#0891b2';if(type==='libre')return'#334155';return sparkColor(v,max);}
function sessionTypesWindowRange(cd,from,to){const result=[];const start=new Date(from+'T12:00:00'),end=new Date(to+'T12:00:00');for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))result.push(cd.sessions?.[d.toISOString().split('T')[0]]?.sessionType||null);return result;}
function deltaHtml(curr,prev){if(prev==null||curr==null)return'';const d=curr-prev;if(Math.abs(d)<0.01)return'';const cls=d>0?'delta-up':'delta-dn';return`<div class="eval-delta ${cls}">${d>0?'+':''}${d.toFixed(1)}</div>`;}
function checkIcon(ok){return ok?`<span style="color:#86efac;font-weight:700;">✓</span>`:`<span style="color:#fca5a5;font-weight:700;">✗</span>`;}
function rsiZone(rsi){if(!rsi)return{bg:'#1e293b',fg:'#64748b',label:'—'};if(rsi<1.5)return{bg:'#2d0a0a',fg:'#fca5a5',label:'Bajo'};if(rsi<2.0)return{bg:'#1c1400',fg:'#fcd34d',label:'Promedio'};if(rsi<2.5)return{bg:'#052e16',fg:'#86efac',label:'Bueno'};return{bg:'#0c1a2e',fg:'#60a5fa',label:'Excelente'};}

// Thresholds: auto-detect from category name
function getThresholds(catId=S.cat, tid=S.teamId) {
  const name = getCatName(catId, tid);
  const isMenores = /U14|U16|U18/i.test(name);
  if(isMenores) return{s6p:60,zadip:-1.75,imo:4.0,zmuscle:1.60,zdiff:3.35,zdiffTarget:4.0,label:'Menores (U14–U18)'};
  return{s6p:60,zadip:-1.95,imo:4.2,zmuscle:1.75,zdiff:3.70,zdiffTarget:4.0,zdiffIdeal:5.0,label:'Pro / U20'};
}
function perfColor(zA,zM,diff,th){
  if(zA===null||zM===null)return null;
  const d=diff!==null?diff:zM-zA;
  const ao=zA<th.zadip, mo=zM>th.zmuscle, dOk=d>=th.zdiff;
  if(dOk&&ao&&mo)return d>=th.zdiffTarget?{bg:'#052e16',fg:'#86efac',label:'Óptimo ✓',sub:'Composición ideal'}:{bg:'#052e16',fg:'#86efac',label:'Bueno ✓',sub:'Sobre umbral mínimo'};
  if(!mo&&ao) return{bg:'#1c1400',fg:'#fcd34d',label:'↑ Aumentar músculo',sub:'Z muscular bajo umbral'};
  if(mo&&!ao) return{bg:'#1c0500',fg:'#fb923c',label:'↓ Reducir adiposo',sub:'Z adiposa sobre umbral'};
  return{bg:'#2d0a0a',fg:'#fca5a5',label:'Revisar composición',sub:'Ambas masas fuera de rango'};
}

// ── Load calculations ─────────────────────────────────────────
function playerLoadOnDate(cd,pid,dateStr){
  const att=cd.attendance[dateStr]?.[pid];
  if(att!=='P'&&att!=='J')return 0;
  const sess=cd.sessions?.[dateStr];
  if(!sess||!sess.duration)return 0;
  const rpe=(sess.playerRPE&&sess.playerRPE[pid]!=null)?sess.playerRPE[pid]:sess.teamRPE;
  if(rpe==null)return 0;
  return rpe*sess.duration;
}
function loadsWindow(cd,pid,endDate,days){
  const result=[];const end=new Date(endDate+'T12:00:00');
  for(let i=days-1;i>=0;i--){const d=new Date(end);d.setDate(d.getDate()-i);result.push(playerLoadOnDate(cd,pid,d.toISOString().split('T')[0]));}
  return result;
}
function calcMetrics(cd,pid){
  const l7=loadsWindow(cd,pid,TODAY,7);
  const l28=loadsWindow(cd,pid,TODAY,28);
  const ac=l7.reduce((a,b)=>a+b,0);
  const cc=l28.reduce((a,b)=>a+b,0)/4;
  const mean7=ac/7;
  const sd7=Math.sqrt(l7.reduce((a,v)=>a+Math.pow(v-mean7,2),0)/7);
  const rawMono=sd7>0?mean7/sd7:(mean7>0?99:0);
  const monotony=Math.min(rawMono,99);
  const strain=Math.round(ac*monotony);
  const acwr=cc>0?Math.round(ac/cc*100)/100:null;
  let wSum=0,wCount=0;
  for(let i=0;i<7;i++){
    const d=new Date(TODAY+'T12:00:00');d.setDate(d.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    const w=cd.sessions?.[ds]?.wellness?.[pid];
    if(w){const vals=W_KEYS.map(k=>w[k]).filter(v=>v!=null);if(vals.length){wSum+=vals.reduce((a,b)=>a+b,0)/vals.length;wCount++;}}
  }
  const wellAvg=wCount>0?Math.round(wSum/wCount*10)/10:null;
  return{ac:Math.round(ac),cc:Math.round(cc),monotony:Math.round(monotony*100)/100,strain,acwr,wellAvg,l7,hasData:l7.some(l=>l>0)||l28.some(l=>l>0)};
}
function getFilterWindow(){
  const f=S.loadFilter;
  let from,to=TODAY;
  if(f==='1d'){from=TODAY;}
  else if(f==='7d'){const d=new Date(TODAY+'T12:00:00');d.setDate(d.getDate()-6);from=d.toISOString().split('T')[0];}
  else if(f==='1m'){const d=new Date(TODAY+'T12:00:00');d.setDate(d.getDate()-29);from=d.toISOString().split('T')[0];}
  else{from=S.loadFrom||TODAY;to=S.loadTo||TODAY;}
  return{from,to};
}
function calcPeriodLoad(cd,pid,from,to){
  let total=0;
  const start=new Date(from+'T12:00:00'),end=new Date(to+'T12:00:00');
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)) total+=playerLoadOnDate(cd,pid,d.toISOString().split('T')[0]);
  return total;
}
function loadsWindowRange(cd,pid,from,to){
  const result=[];
  const start=new Date(from+'T12:00:00'),end=new Date(to+'T12:00:00');
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)) result.push(playerLoadOnDate(cd,pid,d.toISOString().split('T')[0]));
  return result;
}

// ── Attendance helpers ────────────────────────────────────────
function getStats(players,attendance){
  const dates=Object.keys(attendance).sort();
  return players.map(p=>{
    let P=0,A=0,J=0,total=0;
    dates.forEach(d=>{const s=attendance[d]?.[p.id];if(s){total++;if(s==='P')P++;else if(s==='A')A++;else if(s==='J')J++;}});
    const pct=total>0?Math.round((P+J)/total*100):null;
    let consec=0;
    for(let i=dates.length-1;i>=0;i--){const s=attendance[dates[i]]?.[p.id];if(s==='A')consec++;else if(s)break;}
    return{...p,P,A,J,total,pct,consec};
  }).sort((a,b)=>(a.pct??101)-(b.pct??101));
}
function getMonthly(players,attendance){
  const dates=Object.keys(attendance).sort();
  const mm={};
  dates.forEach(d=>{const m=d.slice(0,7);if(!mm[m])mm[m]=[];mm[m].push(d);});
  return Object.entries(mm).sort().map(([month,mDates])=>{
    let tP=0,tT=0;
    mDates.forEach(d=>players.forEach(p=>{const s=attendance[d]?.[p.id];if(s){tT++;if(s==='P'||s==='J')tP++;}}));
    return{month,sessions:mDates.length,avgPct:tT>0?Math.round(tP/tT*100):null};
  });
}

// ── Session state ─────────────────────────────────────────────
function loadSession(){
  const cd=getCat();
  const ex=cd.attendance[S.date];
  if(ex){const{justReasons:_jr,..._rest}=ex;S.sess={..._rest};S.justReasons={...(_jr||{})};}else{S.sess={};S.justReasons={};cd.players.forEach(p=>{S.sess[p.id]='P';});}
}
function loadSessionDraft(){
  const cd=getCat();
  const ex=cd.sessions?.[S.date]||{};
  S.sessionDraft={duration:ex.duration||'',teamRPE:ex.teamRPE??null,playerRPE:{...(ex.playerRPE||{})},sessionType:ex.sessionType||null};
  S.wellnessDraft={};
  const w=ex.wellness||{};
  cd.players.forEach(p=>{S.wellnessDraft[p.id]=w[p.id]?{...w[p.id]}:null;});
  S.wellnessExpanded={};
}
async function saveAttendance(){
  const _jr=Object.fromEntries(Object.entries(S.justReasons).filter(([k])=>S.sess[k]==='J'));getCat().attendance[S.date]={...S.sess,...(Object.keys(_jr).length?{justReasons:_jr}:{})};
  await persistCat();render();
  const msg=document.getElementById('save-msg');
  if(msg){msg.textContent='✓ Guardado';setTimeout(()=>{if(msg)msg.textContent='';},2500);}
}
async function saveSessionDraft(){
  const cd=getCat();
  if(!cd.sessions)cd.sessions={};
  const ex=cd.sessions[S.date]||{};
  const wellness={...(ex.wellness||{})};
  Object.entries(S.wellnessDraft).forEach(([pid,w])=>{if(w!==null)wellness[pid]=w;});
  const playerRPE={...(ex.playerRPE||{}),...S.sessionDraft.playerRPE};
  cd.sessions[S.date]={
    duration:S.sessionDraft.duration?parseInt(S.sessionDraft.duration):ex.duration,
    teamRPE:S.sessionDraft.teamRPE!==null?S.sessionDraft.teamRPE:ex.teamRPE,
    sessionType:S.sessionDraft.sessionType!==null?S.sessionDraft.sessionType:(ex.sessionType||null),
    playerRPE,wellness
  };
  await persistCat();
}
async function addPlayer(){
  const inp=document.getElementById('new-player');
  if(!inp||!inp.value.trim())return;
  getCat().players.push({id:Date.now().toString(),name:inp.value.trim()});
  await persistCat();render();
}

// ── Render ────────────────────────────────────────────────────
function render(){
  const body=document.getElementById('app-body');if(!body)return;
  // Invite accept modal takes priority as overlay
  if(S.showInviteModal && S.pendingInviteData){
    // Render underlying home view, then overlay modal
    body.innerHTML=renderHome()+renderInviteModal();
    attachEvents(); updateHeader(); return;
  }
  if(S.profileView){ body.innerHTML=renderProfileView(); attachEvents(); updateHeader(); return; }
  if(S.view==='search') {body.innerHTML=renderSearch();attachEvents();updateHeader();return;}
  if(S.view==='athlete'){body.innerHTML=renderAthleteView();attachEvents();updateHeader();return;}
  if(S.view==='home')   body.innerHTML=renderHome();
  else if(S.view==='team') body.innerHTML=renderTeamView();
  else if(S.view==='cat')  body.innerHTML=renderCatHeader()+renderCat();
  updateHeader();
  attachEvents();
}

// ── TEAM VIEW: Categories list ────────────────────────────────
function renderTeamView(){
  const t=getTeam();
  const cats=getCats();
  const color=t.color||CAT_PALETTE[0];
  const header=`<div class="sec-header">
    <button class="back-btn" data-action="home">← Inicio</button>
    <span class="sec-title">${t.name}</span>
    <span class="sport-badge">${t.sport||''}</span>
    ${isOwner()?`<button class="sm-btn" data-action="toggleaccess" data-tid="${S.teamId}" style="color:#60a5fa;border-color:#1e40af;position:relative;">👥${(()=>{const u=(S.teamNotifs[S.teamId]||[]).filter(n=>!n.read).length;return u?`<span style="position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">${u}</span>`:''})()}</button>`:''}
    ${isOwner()?`<button class="sm-btn" data-action="editteam">⚙ Editar</button>`:''}
  </div>`;

  const catCards=cats.map((cid,i)=>{
    const c=t.categories[cid];
    const players=Array.isArray(c.players)?c.players:Object.values(c.players||[]);
    const col=c.color||CAT_PALETTE[i%CAT_PALETTE.length];
    const dates=Object.keys(c.attendance||{}).sort();
    const lastDate=dates[dates.length-1];
    const todayOk=!!c.attendance?.[TODAY];
    const allM=players.map(p=>calcMetrics(c,p.id));
    const acwrs=allM.map(m=>m.acwr).filter(v=>v!==null);
    const avgAcwr=acwrs.length>0?Math.round(acwrs.reduce((a,b)=>a+b,0)/acwrs.length*100)/100:null;
    const az=acwrZone(avgAcwr);
    const acwrAlerts=allM.filter(m=>m.acwr!==null&&m.acwr>1.5).length;
    const stats=getStats(players,c.attendance||{});
    const withPct=stats.filter(s=>s.pct!==null);
    const avgPct=withPct.length>0?Math.round(withPct.reduce((a,s)=>a+s.pct,0)/withPct.length):null;
    const alerts=stats.filter(s=>s.consec>=ALERT_N).length;
    return`<button class="cat-card" data-action="opencat" data-cid="${cid}" style="padding-left:20px;">
      <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${col};border-radius:2px 0 0 2px;"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:17px;font-weight:500;color:var(--text);">${c.name}</span>
        <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;">
          ${alerts>0?`<span class="badge badge-bad">⚠ ${alerts} aus.</span>`:''}
          ${acwrAlerts>0?`<span class="badge badge-bad">⚠ ACWR</span>`:''}
          ${avgPct!==null?`<span class="badge ${pctClass(avgPct)}">${avgPct}%</span>`:''}
          ${avgAcwr!==null?`<span style="background:${az.bg};color:${az.fg};padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;">ACWR ${avgAcwr}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:10px;font-size:12px;color:var(--text2);flex-wrap:wrap;">
        <span>${players.length} jugadores</span>
        ${lastDate?`<span>Última: ${fmtDate(lastDate)}</span>`:'<span>Sin registros</span>'}
        <span class="badge ${todayOk?'badge-today':'badge-nottoday'}">${todayOk?'✓ Hoy':'Hoy pendiente'}</span>
      </div>
    </button>`;
  }).join('');

  const empty=!cats.length?`<div class="empty-state">Sin categorías.<br>Creá la primera para empezar a registrar.</div>`:'';

  return header+`<div class="wrap">
    ${S.accessPanel&&isOwner()?renderAccessPanel(S.teamId):''}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:13px;font-weight:600;color:var(--text2);">CATEGORÍAS</div>
      ${isOwner()?`<button class="add-btn" data-action="newcat">+ Nueva categoría</button>`:''}
    </div>
    ${S.teamFormMode==='edit'?renderTeamForm():''}
    ${S.catFormMode?renderCatForm():''}
    ${catCards}${empty}
  </div>`;
}

function renderCatForm(){
  const isEdit=S.catFormMode==='edit';
  const cid=S.editingCatId;
  const c=isEdit&&cid?getCat(cid):{name:'',color:''};
  const colorIdx=getCats().length%CAT_PALETTE.length;
  const defaultColor=CAT_PALETTE[colorIdx];
  return`<div class="form-card" style="margin-bottom:12px;border-color:#059669;">
    <div class="form-card-title" style="color:#059669;">${isEdit?'Editar categoría':'Nueva categoría'} <button class="sm-btn" data-action="cancelcatform">✕</button></div>
    <div class="form-field" style="margin-bottom:8px;"><label>Nombre</label><input type="text" id="cf-name" value="${isEdit?(c.name||''):''}" placeholder="Ej: U16A, Sub-20, Primera División"></div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px;">💡 Si el nombre contiene U14, U16 o U18, los umbrales antropométricos se detectan automáticamente como Menores.</div>
    <div class="form-row">
      ${isEdit&&isOwner()?`<button class="sm-btn" style="color:#fca5a5;border-color:#991b1b;" data-action="deletecat" data-cid="${cid}">Eliminar categoría</button>`:''}
      <button class="save-btn" style="flex:1;background:#059669;" data-action="${isEdit?'saveeditcat':'savenewcat'}">${isEdit?'Guardar':'Crear categoría'}</button>
    </div>
  </div>`;
}

// ── CATEGORY VIEW ─────────────────────────────────────────────
function renderCatHeader(){
  const c=getCat(); const catName=getCatName(); const color=getCatColor();
  const role=myRole();
  const rolePill=role&&role!=='owner'?`<span class="role-pill ${role==='editor'?'role-editor':'role-viewer'}">${role==='editor'?'Editor':'Lector'}</span>`:'';
  const tabs=[['attend','Asist.'],['session','Sesión'],['metrics','Cargas'],['reports','Reportes'],['roster','Plantel']];
  return`<div class="sec-header">
    <button class="back-btn" data-action="backtoTeam">← ${getTeam().name||'Equipo'}</button>
    <span class="sec-title">${catName}</span>
    <span style="background:${color}22;color:${color};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">${c.players.length} jug.</span>
    ${rolePill}
    ${isOwner()?`<button class="sm-btn" data-action="editcurrentcat">⚙</button>`:''}
  </div>
  <div class="tabs">${tabs.map(([t,l])=>`<button class="tab-btn${S.tab===t?' active':''}" data-action="tab" data-tab="${t}">${l}</button>`).join('')}</div>`;
}

function renderCat(){
  const map={attend:renderAttend,session:renderSession,metrics:renderMetrics,reports:renderReports,roster:renderRoster};
  return`<div class="wrap">${(map[S.tab]||renderRoster)()}</div>`;
}

// ── ATTENDANCE ────────────────────────────────────────────────
function renderAttend(){
  const cd=getCat();
  const editable=canEdit();
  const _jrStyle='font-size:10px;padding:2px 7px;border-radius:12px;cursor:pointer;border:.5px solid #92400e;font-weight:500;';
  const rows=cd.players.map(p=>{
    const cur=S.sess[p.id];
    const reason=S.justReasons[p.id]||null;
    const reasonDef=reason?JUST_REASONS.find(r=>r.id===reason):null;
    const btns=['P','A','J'].map(s=>`<button class="status-btn${cur===s?` active-${s.toLowerCase()}`:''}" ${editable?`data-action="setstatus" data-pid="${p.id}" data-status="${s}"`:'disabled style="cursor:default;"'}>${s}${s==='J'&&reasonDef&&cur==='J'?` <span style="font-size:9px;">${reasonDef.icon}</span>`:''}</button>`).join('');
    const reasonRow=cur==='J'&&editable?`<div style="display:flex;gap:4px;flex-wrap:wrap;padding:3px 0 6px 0;">${JUST_REASONS.map(r=>`<button style="${_jrStyle}background:${reason===r.id?'#92400e':'var(--bg2)'};color:${reason===r.id?'#fcd34d':'var(--text3)'};" data-action="setjustreason" data-pid="${p.id}" data-reason="${r.id}">${r.icon} ${r.label}</button>`).join('')}</div>`:cur==='J'&&reasonDef?`<div style="padding:0 0 4px 0;"><span style="${_jrStyle}background:#1c1400;color:#fcd34d;">${reasonDef.icon} ${reasonDef.label}</span></div>`:'';
    return`<div class="player-row"><span class="player-name">${p.name}</span><div class="status-group">${btns}</div></div>${reasonRow}`;
  }).join('');
  const counts={P:0,A:0,J:0};
  Object.values(S.sess).forEach(v=>{if(counts[v]!==undefined)counts[v]++;});
  const chips=['P','A','J'].filter(s=>counts[s]>0).map(s=>`<span class="count-chip chip-${s.toLowerCase()}">${counts[s]} ${s}</span>`).join('');
  const _stDef=SESSION_TYPES.find(t=>t.id===(cd.sessions?.[S.date]?.sessionType));
  const _stBadge=_stDef?`<div style="text-align:center;font-size:12px;color:var(--text2);margin-bottom:8px;padding:4px 10px;background:var(--bg2);border-radius:8px;border:1px solid var(--border);">${_stDef.icon} ${_stDef.label}</div>`:'';
  return`${!editable?`<div class="readonly-banner">👁 Modo lectura — no podés editar asistencia en esta categoría.</div>`:''}
  <div class="date-row">
    <button class="arrow-btn" data-action="prevday">‹</button>
    <input type="date" value="${S.date}" max="${TODAY}" id="date-input">
    <button class="arrow-btn" data-action="nextday" ${S.date>=TODAY?"disabled style='opacity:.3;'":''}>  › </button>
  </div>
  ${_stBadge}
  ${editable?`<div class="quick-row"><button class="quick-btn quick-p" data-action="allp">Todos Presente</button><button class="quick-btn quick-a" data-action="alla">Todos Ausente</button></div>`:''}
  ${rows}
  <div class="save-row">
    <div class="save-counts">${chips}</div>
    <span id="save-msg" style="font-size:13px;color:#86efac;font-weight:500;"></span>
    ${editable?`<button class="save-btn" data-action="save">Guardar</button>`:''}
  </div>`;
}


// ── SESSION ───────────────────────────────────────────────────
function renderSession(){

    <input type="date" value="${S.date}" max="${TODAY}" id="date-input">

}
function renderSessionLoad(){
  const sd=S.sessionDraft,ex=getCat().sessions?.[S.date];

  const stRow=editable?`<div class="rpe-mode-row" style="flex-wrap:wrap;gap:5px;margin-bottom:12px;">${stBtns}</div>`:(stDef?`<div style="font-size:13px;color:var(--text2);margin-bottom:10px;">${stDef.icon} ${stDef.label}</div>`:'');

    <input type="number" id="dur-input" value="${durVal}" placeholder="90" min="1" max="300" ${editable?'':' disabled'}>
    <span style="font-size:13px;color:var(--text3);">min</span>

    <button class="rpe-mode-btn${S.rpeMode==='individual'?' active':''}" data-action="rpemode" data-mode="individual">RPE Individual</button>

  ${S.rpeMode==='team'?renderTeamRPE():renderIndividualRPE()}

  <span id="sess-save-msg" style="display:block;text-align:center;font-size:13px;color:#86efac;font-weight:500;margin-top:6px;min-height:20px;"></span>
  ${hasLoad?`<div style="text-align:center;font-size:11px;color:var(--text3);margin-top:4px;">✓ Guardado · ${stDef?stDef.icon+' '+stDef.label+' · ':''}${ex.duration}min · RPE ${ex.teamRPE!=null?ex.teamRPE+' (equipo)':'individual'}</div>`:''}`;
}
function renderTeamRPE(){
  const val=S.sessionDraft.teamRPE,dur=parseInt(S.sessionDraft.duration)||0;
  const btns=Array.from({length:11},(_,i)=>`<button class="rpe-btn${val===i?' sel':''}" style="background:${val===i?RPE_BG[i]:'var(--bg2)'};color:${val===i?RPE_FG[i]:'var(--text3)'};" data-action="teamrpe" data-rpe="${i}">${i}</button>`).join('');

    ${val!==null&&dur?`<div class="load-est">Carga estimada: <strong>${val*dur} UA</strong> · ${dur}min × RPE${val}</div>`:''}

}
function renderIndividualRPE(){

    const btns=Array.from({length:11},(_,i)=>`<button class="rpe-btn${rpeVal===i?' sel':''}" style="background:${rpeVal===i?RPE_BG[i]:'var(--bg2)'};color:${rpeVal===i?RPE_FG[i]:'var(--text3)'};height:36px;font-size:12px;" data-action="playerrpe" data-pid="${p.id}" data-rpe="${i}">${i}</button>`).join('');

      <div class="p-rpe-top"><span class="p-rpe-name">${p.name}</span>${rpeVal!==null?`<span style="font-size:12px;color:${RPE_BG[rpeVal]};font-weight:600;">RPE${rpeVal}${dur?' · '+(rpeVal*dur)+'UA':''}</span>`:''}</div>

function renderSessionWellness(){
  const cd=getCat();

  ${cd.players.map(p=>{
    const w=S.wellnessDraft[p.id];

    const dotColor=avgScore===null?'#475569':W_COLORS[Math.round(clamp(avgScore,1,5))-1];
    const expanded=!!S.wellnessExpanded[p.id];
    const wellItems=W_KEYS.map(k=>{

      return`<div class="well-item"><span class="well-key">${W_ICONS[k]} ${W_LABELS[k]}</span><div class="well-opts">${opts}</div>${v!==null?`<span class="well-tip">${W_TIPS[k][v-1]}</span>`:''}</div>`;

      <div class="well-player-top">
        <span class="well-status-dot" style="background:${dotColor};"></span>

      ${expanded?`<div class="well-expand">${wellItems}<button class="save-btn" style="width:100%;margin-top:10px;padding:8px;font-size:13px;" data-action="savesession">Guardar wellness</button></div>`:''}
    </div>`;

// ── METRICS ───────────────────────────────────────────────────
function renderMetrics(){
  const cd=getCat();
  if(!cd.players.length)return`<div class="empty-state">Sin jugadores en el plantel.</div>`;
  const {from,to}=getFilterWindow();
  const FILTER_OPTS=[['1d','1 día'],['7d','7 días'],['1m','1 mes'],['custom','A medida']];
  const filterBar=`<div style="margin-bottom:12px;">
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">
      ${FILTER_OPTS.map(([v,l])=>`<button class="sub-tab${S.loadFilter===v?' active':''}" data-action="loadfilter" data-val="${v}">${l}</button>`).join('')}
      <button class="sm-btn" style="margin-left:auto;color:#60a5fa;border-color:#1e40af;" data-action="exportloadspdf">⬇ PDF</button>
    </div>
    ${S.loadFilter==='custom'?`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <div style="font-size:12px;color:var(--text2);">Del</div>
      <input type="date" id="load-from" value="${S.loadFrom||TODAY}" max="${TODAY}" style="font-size:12px;padding:5px 8px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--font);">
      <div style="font-size:12px;color:var(--text2);">al</div>
      <input type="date" id="load-to" value="${S.loadTo||TODAY}" max="${TODAY}" style="font-size:12px;padding:5px 8px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--font);">
      <button class="save-btn" style="padding:5px 12px;font-size:12px;" data-action="applycustomfilter">Aplicar</button>
    </div>`:''}
  </div>`;
  const filterLabel=S.loadFilter==='1d'?'hoy':S.loadFilter==='7d'?'últimos 7 días':S.loadFilter==='1m'?'últimos 30 días':`${fmtDate(from)}–${fmtDate(to)}`;
  const periodTypes=sessionTypesWindowRange(cd,from,to);
  const allM=cd.players.map(p=>({...calcMetrics(cd,p.id),id:p.id,name:p.name,periodLoad:calcPeriodLoad(cd,p.id,from,to),periodBars:loadsWindowRange(cd,p.id,from,to)}));
  const withData=allM.filter(m=>m.hasData||m.periodLoad>0);
  const acwrRisk=allM.filter(m=>m.acwr!==null&&m.acwr>1.5);
  const acwrLow=allM.filter(m=>m.acwr!==null&&m.acwr<0.8);
  const monoHigh=allM.filter(m=>m.monotony>2.0);
  const legend=`<div style="margin-bottom:12px;"><div class="section-label" style="margin-bottom:6px;">Zonas ACWR</div>
    <div class="zone-legend">
      <span class="zone-chip" style="background:#1e293b;color:#94a3b8;">< 0.8 Subcarga</span>
      <span class="zone-chip" style="background:#052e16;color:#86efac;">0.8–1.3 Óptimo</span>
      <span class="zone-chip" style="background:#1c1400;color:#fcd34d;">1.3–1.5 Precaución</span>
      <span class="zone-chip" style="background:#2d0a0a;color:#fca5a5;">> 1.5 Riesgo</span>
    </div></div>`;
  let sessionDays=0;for(let i=0;i<28;i++){const d=new Date(TODAY+'T12:00:00');d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];if(cd.sessions[ds]?.duration)sessionDays++;}
  const insufficientDataBanner=sessionDays<14?`<div class="readonly-banner">⏳ Datos insuficientes — el ACWR requiere al menos 2-3 semanas de historial para ser confiable. Seguí registrando sesiones para obtener valores precisos.</div>`:'';
  const hasAlerts=acwrRisk.length||acwrLow.length||monoHigh.length;
  const alertsHtml=hasAlerts?`<div class="alert-banner">
    <div class="alert-banner-title"><span style="font-size:16px;">⚠</span> Alertas</div>
    ${acwrRisk.map(m=>`<div style="font-size:12px;">• ${m.name}: ACWR ${m.acwr} — Riesgo sobreentrenamiento</div>`).join('')}
    ${acwrLow.map(m=>`<div style="font-size:12px;">• ${m.name}: ACWR ${m.acwr} — Subcarga</div>`).join('')}
    ${monoHigh.map(m=>`<div style="font-size:12px;">• ${m.name}: Monotonía ${m.monotony} — Alta variación</div>`).join('')}
  </div>`:'';
  if(!withData.length)return filterBar+legend+insufficientDataBanner+`<div class="empty-state">Sin datos de sesión aún.<br>Registrá RPE y duración en la tab <strong>Sesión</strong>.</div>`;
  const acwrVals=withData.filter(m=>m.acwr!==null);
  const avgAcwr=acwrVals.length>0?Math.round(acwrVals.reduce((a,m)=>a+m.acwr,0)/acwrVals.length*100)/100:null;
  const totalPeriod=Math.round(allM.reduce((a,m)=>a+m.periodLoad,0)/Math.max(1,allM.filter(m=>m.periodLoad>0).length));
  const teamAz=acwrZone(avgAcwr);
  const teamOverview=`<div class="metric-grid">
    <div class="metric"><div class="metric-label">Carga período prom.</div><div class="metric-val">${totalPeriod||0} <span style="font-size:12px;color:var(--text2);">UA</span></div></div>
    ${avgAcwr!==null?`<div class="metric" style="background:${teamAz.bg};border-color:${teamAz.border};"><div class="metric-label">ACWR promedio</div><div class="metric-val" style="color:${teamAz.fg};">${avgAcwr} <span style="font-size:12px;">${teamAz.label}</span></div></div>`:''}
  </div>`;
  const cards=allM.map(m=>{
    const az=acwrZone(m.acwr),mz=monoZone(m.monotony),wz=wellZone(m.wellAvg);
    const bars=m.periodBars;const maxSpark=Math.max(...bars,1);
    const sparkTotal=bars.reduce((a,b)=>a+b,0);
    const sparks=bars.map((v,i)=>{const tp=periodTypes[i]||null;const tDef=SESSION_TYPES.find(t=>t.id===tp);const ttip=tDef?`${tDef.icon} ${tDef.label} · ${v} UA`:`${v} UA`;return`<div class="spark-bar" title="${ttip}" style="height:${Math.max(2,Math.round(v/maxSpark*24))}px;background:${sparkColorByType(v,maxSpark,tp)};flex:1;min-width:0;"></div>`;}).join('');
    const sparkLbls=bars.map(v=>`<div style="flex:1;min-width:0;font-size:9px;color:var(--text3);text-align:center;line-height:1;">${v>0?v:''}</div>`).join('');
    const showPeriod=S.loadFilter!=='7d';
    // Wellness trend: avg last 3d vs avg last 7d
    let _w3=0,_c3=0,_w7=0,_c7=0;
    for(let i=0;i<7;i++){const _d=new Date(TODAY+'T12:00:00');_d.setDate(_d.getDate()-i);const _ds=_d.toISOString().split('T')[0];const _w=cd.sessions?.[_ds]?.wellness?.[m.id];if(_w){const _v=W_KEYS.map(k=>_w[k]).filter(v=>v!=null);if(_v.length){const _a=_v.reduce((a,b)=>a+b,0)/_v.length;_w7+=_a;_c7++;if(i<3){_w3+=_a;_c3++;}}}}
    const _avg3=_c3>0?_w3/_c3:null,_avg7=_c7>0?_w7/_c7:null;
    const wellTrend=_avg3!==null&&_avg7!==null&&_avg7-_avg3>0.5;
    // Last wellness entry: find most recent
    const _sdates=Object.keys(cd.sessions||{}).sort().reverse();
    let _lastW=null;for(const _ds of _sdates){const _w=cd.sessions[_ds]?.wellness?.[m.id];if(_w&&W_KEYS.some(k=>_w[k]!=null)){_lastW=_w;break;}}
    const _lowKeys=_lastW?W_KEYS.filter(k=>_lastW[k]!=null&&_lastW[k]<=2):[];
    const _wStyle='font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#1c1400;color:#fcd34d;border:.5px solid #92400e;';
    const _wBadges=(wellTrend?[`<span style="${_wStyle}">↓ Wellness</span>`]:[]).concat(_lowKeys.length>=2?[`<span style="${_wStyle}">${_lowKeys.map(k=>W_ICONS[k]+' '+W_LABELS[k]+' '+_lastW[k]).join(' · ')}</span>`]:[]);
    const wellBadgesHtml=_wBadges.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">${_wBadges.join('')}</div>`:'';
    return`<div class="metrics-card">
      <div class="metrics-card-top">
        <span class="metrics-name">${m.name}</span>
        ${m.acwr!==null?`<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${az.bg};color:${az.fg};border:.5px solid ${az.border};">ACWR ${m.acwr}</span>`:'<span style="font-size:11px;color:var(--text3);">Sin datos</span>'}
      </div>
      <div class="metrics-row" style="grid-template-columns:repeat(${showPeriod?5:4},1fr);">
        ${showPeriod?`<div class="m-cell" style="background:#0f172a;border:1px solid var(--accent);"><div class="m-cell-label" style="color:#60a5fa;">Período</div><div class="m-cell-val" style="color:#60a5fa;">${m.periodLoad}</div></div>`:''}
        <div class="m-cell"><div class="m-cell-label">AC (7d)</div><div class="m-cell-val">${m.ac}</div></div>
        <div class="m-cell"><div class="m-cell-label">CC (4s)</div><div class="m-cell-val">${m.cc}</div></div>
        <div class="m-cell"><div class="m-cell-label">Mono.</div><div class="m-cell-val" style="color:${mz.fg};">${m.monotony||'—'}</div></div>
        <div class="m-cell"><div class="m-cell-label">Wellness</div><div class="m-cell-val" style="color:${wz.fg};">${m.wellAvg||'—'}</div></div>
      </div>
      ${wellBadgesHtml}
      <div style="display:flex;align-items:flex-end;gap:${bars.length>15?'1':'2'}px;height:24px;margin-bottom:2px;">${sparks}</div>
      <div style="display:flex;gap:${bars.length>15?'1':'2'}px;margin-bottom:3px;">${sparkLbls}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:10px;color:var(--text3);">${filterLabel}</div>
        <div style="font-size:10px;color:var(--text2);font-weight:500;">Total: ${sparkTotal} UA</div>
      </div>
    </div>`;
  }).join('');
  return filterBar+legend+insufficientDataBanner+alertsHtml+teamOverview+cards;
}

// ── REPORTS ───────────────────────────────────────────────────

      return`<div class="report-row">
        <div class="rep-top"><span class="rep-name">${p.name}</span>${pctBadge(p.pct)}</div>
        <div class="rep-detail"><span>${p.P} P</span><span>${p.A} A</span><span>${p.J} J</span><span>${p.total} ses.</span>${p.consec>=ALERT_N?`<span style="color:#fca5a5;font-weight:500;">⚠ ${p.consec} aus.</span>`:''}</div>
        ${reasonBadges}
        ${bar}
      </div>`;
    }).join('');
  } else if(S.reportSub==='months'){
    const monthly=getMonthly(cd.players,cd.attendance);
    content=!monthly.length?`<div class="empty-state">Sin datos.</div>`:monthly.reverse().map(m=>`<div class="report-row">
      <div class="rep-top"><span class="rep-name">${fmtMonth(m.month)}</span>${pctBadge(m.avgPct)}</div>
      <div class="rep-detail"><span>${m.sessions} sesiones</span></div>
      ${m.avgPct!==null?`<div class="pbar"><div class="pbar-fill" style="width:${m.avgPct}%;background:${m.avgPct>=75?'#22c55e':m.avgPct>=50?'#f59e0b':'#ef4444'};"></div></div>`:''}
    </div>`).join('');
  } else {
    const allM=cd.players.map(p=>({...calcMetrics(cd,p.id),name:p.name})).sort((a,b)=>(b.acwr||0)-(a.acwr||0));
    content=!allM.length?`<div class="empty-state">Sin datos.</div>`:allM.map(m=>{

      return`<div class="report-row">
        <div class="rep-top"><span class="rep-name">${m.name}</span>${m.acwr!==null?`<span style="font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;background:${az.bg};color:${az.fg};">ACWR ${m.acwr}</span>`:`<span style="font-size:12px;color:var(--text3);">—</span>`}</div>

  }
  return`${alertCount>0?`<div class="alert-banner"><div class="alert-banner-title">⚠ ${alertCount} jugador${alertCount>1?'es':''} con ${ALERT_N}+ ausencias seguidas</div></div>`:''}

    <button class="sm-btn" style="color:#60a5fa;border-color:#1e40af;padding:5px 12px;" data-action="exportcategorycsv">⬇ Exportar CSV</button>
  </div>

  ${content}`;
}
